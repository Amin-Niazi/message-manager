<!DOCTYPE html>
<!-- lang="fa" dir="rtl" یعنی زبان صفحه فارسی و جهت نوشتار راست‌به‌چپ است -->
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8"> <!-- کدگذاری کاراکترها؛ برای نمایش درست فارسی لازم است -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- سازگاری با موبایل -->
    <title>پنل ادمین | مدیریت پیام‌ها</title> <!-- عنوان تب مرورگر -->
    <style>
        /* ─────────────────────────────────────
           پایه
        ───────────────────────────────────── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* ─────────────────────────────────────
           هدر
        ───────────────────────────────────── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e6edf3;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .admin-badge {
            background: #1f2937;
            border: 1px solid #d29922;
            color: #d29922;
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .logout-btn {
            background: none;
            border: 1px solid #30363d;
            color: #8b949e;
            font-size: 0.78rem;
            font-family: inherit;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            border-color: #f85149;
            color: #f85149;
        }

        /* ─────────────────────────────────────
           پنل‌های عمومی (کامپوز / دسته‌بندی)
        ───────────────────────────────────── */
        .compose-panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .compose-panel h2 {
            font-size: 1rem;
            color: #8b949e;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        textarea {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.75;
            padding: 0.875rem 1rem;
            resize: vertical;
            min-height: 120px;
            outline: none;
            transition: border-color 0.2s;
            direction: rtl;
            margin-bottom: 1rem;
        }

        textarea:focus {
            border-color: #58a6ff;
        }

        textarea::placeholder {
            color: #484f58;
        }

        /* ─────────────────────────────────────
           انتخاب دسته‌بندی هنگام نوشتن پیام
        ───────────────────────────────────── */
        .category-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .category-row label {
            font-size: 0.85rem;
            color: #8b949e;
            white-space: nowrap;
        }

        select {
            flex: 1;
            min-width: 160px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-family: inherit;
            font-size: 0.9rem;
            padding: 0.6rem 0.8rem;
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: #58a6ff;
        }

        .add-category-toggle {
            background: none;
            border: 1px dashed #30363d;
            color: #58a6ff;
            font-size: 0.82rem;
            font-family: inherit;
            padding: 0.6rem 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
        }

        .add-category-toggle:hover {
            border-color: #58a6ff;
        }

        .new-category-row {
            display: none;
            gap: 0.6rem;
            margin-bottom: 1rem;
        }

        .new-category-row.show {
            display: flex;
        }

        .new-category-row input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-family: inherit;
            font-size: 0.9rem;
            padding: 0.6rem 0.8rem;
            outline: none;
            direction: rtl;
        }

        .new-category-row input:focus {
            border-color: #58a6ff;
        }

        .mini-btn {
            background: #1f6feb;
            border: 1px solid #388bfd;
            color: #fff;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
        }

        .mini-btn:hover:not(:disabled) { background: #388bfd; }
        .mini-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ─────────────────────────────────────
           آپلود عکس ضمیمه پیام
        ───────────────────────────────────── */
        .image-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .image-upload-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: none;
            border: 1px dashed #30363d;
            color: #8b949e;
            font-family: inherit;
            font-size: 0.82rem;
            padding: 0.55rem 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
        }

        .image-upload-btn:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .image-width-select {
            display: none;
            flex: 1;
            min-width: 140px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-family: inherit;
            font-size: 0.85rem;
            padding: 0.55rem 0.7rem;
            outline: none;
            cursor: pointer;
        }

        .image-width-select.show { display: block; }

        .remove-image-btn {
            display: none;
            background: none;
            border: 1px solid #30363d;
            color: #f85149;
            font-family: inherit;
            font-size: 0.8rem;
            padding: 0.55rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
        }

        .remove-image-btn.show { display: inline-block; }

        .image-preview-wrap {
            display: none;
            margin-bottom: 1rem;
        }

        .image-preview-wrap.show { display: block; }

        .image-preview-wrap img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            border: 1px solid #30363d;
        }

        .compose-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        #char-count {
            font-size: 0.8rem;
            color: #8b949e;
        }

        /* ─────────────────────────────────────
           دکمه ذخیره
        ───────────────────────────────────── */
        .save-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #238636;
            border: 1px solid #2ea043;
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.6rem 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .save-btn:hover:not(:disabled) {
            background: #2ea043;
        }

        .save-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .save-btn.loading {
            background: #1f6feb;
            border-color: #388bfd;
        }

        /* ─────────────────────────────────────
           نوار اعلان
        ───────────────────────────────────── */
        .toast {
            display: none;
            align-items: center;
            gap: 0.6rem;
            padding: 0.875rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }

        .toast.success {
            display: flex;
            background: #0d2a15;
            border: 1px solid #2ea043;
            color: #3fb950;
        }

        .toast.error {
            display: flex;
            background: #2d0f0f;
            border: 1px solid #f85149;
            color: #f85149;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─────────────────────────────────────
           فیلتر دسته‌بندی برای لیست پیام‌ها
        ───────────────────────────────────── */
        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .filter-tab {
            background: #161b22;
            border: 1px solid #30363d;
            color: #8b949e;
            font-family: inherit;
            font-size: 0.8rem;
            padding: 0.4rem 0.9rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-tab:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .filter-tab.active {
            background: #1f6feb;
            border-color: #388bfd;
            color: #fff;
        }

        /* ─────────────────────────────────────
           لیست پیام‌های موجود
        ───────────────────────────────────── */
        .messages-section h2 {
            font-size: 1rem;
            color: #8b949e;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .message-count {
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-right: 0.5rem;
        }

        #messages-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .message-num {
            color: #58a6ff;
            font-size: 0.8rem;
            font-family: monospace;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 2px 8px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message-body {
            flex: 1;
        }

        .message-text {
            font-size: 0.9rem;
            line-height: 1.7;
            color: #c9d1d9;
            margin-bottom: 0.5rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message-meta-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .message-time {
            font-size: 0.75rem;
            color: #8b949e;
        }

        .category-tag {
            font-size: 0.72rem;
            background: #1f2937;
            border: 1px solid #388bfd;
            color: #79c0ff;
            padding: 1px 9px;
            border-radius: 10px;
        }

        .category-tag.none {
            border-color: #30363d;
            color: #8b949e;
        }

        /* دکمه حذف */
        .delete-btn {
            background: none;
            border: none;
            color: #8b949e;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            color: #f85149;
            background: #2d0f0f;
        }

        /* لودینگ */
        .skeleton {
            background: linear-gradient(90deg, #161b22 25%, #21262d 50%, #161b22 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 4px;
            height: 60px;
        }

        @keyframes shimmer {
            from { background-position: 200% 0; }
            to   { background-position: -200% 0; }
        }

        /* صفحه در حال بررسی ورود */
        .auth-checking {
            text-align: center;
            padding: 4rem 1rem;
            color: #8b949e;
        }
    </style>
</head>
<body>

<!-- تا زمانی که وضعیت ورود بررسی می‌شود -->
<div class="auth-checking" id="auth-checking">در حال بررسی ورود...</div>

<div class="container" id="app" style="display:none">

    <!-- هدر -->
    <div class="page-header">
        <h1>🛠 پنل ادمین</h1>
        <div class="header-right">
            <span class="admin-badge" id="admin-badge">مدیریت پیام‌ها</span>
            <button class="logout-btn" onclick="logout()">خروج</button>
        </div>
    </div>

    <!-- اعلان موفقیت / خطا -->
    <div class="toast" id="toast"></div>

    <!-- فرم ارسال پیام -->
    <div class="compose-panel">
        <h2>✏️ پیام جدید</h2>

        <div class="category-row">
            <label for="category-select">دسته‌بندی (اختیاری - پیش‌فرض: عمومی):</label>
            <select id="category-select">
                <option value="">در حال بارگذاری...</option>
            </select>
            <button type="button" class="add-category-toggle" onclick="toggleNewCategory()">+ دسته جدید</button>
        </div>

        <div class="new-category-row" id="new-category-row">
            <input type="text" id="new-category-input" placeholder="نام دسته‌بندی جدید...">
            <button type="button" class="mini-btn" id="add-category-btn" onclick="addCategory()">افزودن</button>
        </div>

        <textarea
            id="message-input"
            placeholder=".متن پیام خود را اینجا بنویسید..."
            maxlength="5000"
        ></textarea>

        <!-- پیش‌نمایش عکس انتخاب‌شده -->
        <div class="image-preview-wrap" id="image-preview-wrap">
            <img id="image-preview" src="" alt="پیش‌نمایش عکس">
        </div>

        <!-- ردیف افزودن عکس و تنظیم اندازه نمایش آن -->
        <div class="image-row">
            <input type="file" id="image-input" accept="image/png, image/jpeg, image/gif, image/webp" style="display:none">
            <button type="button" class="image-upload-btn" onclick="document.getElementById('image-input').click()">
                🖼️ افزودن عکس
            </button>
            <select id="image-width-select" class="image-width-select">
                <option value="25">اندازه عکس: کوچک (۲۵٪)</option>
                <option value="50">اندازه عکس: متوسط (۵۰٪)</option>
                <option value="75">اندازه عکس: بزرگ (۷۵٪)</option>
                <option value="100" selected>اندازه عکس: تمام عرض (۱۰۰٪)</option>
            </select>
            <button type="button" class="remove-image-btn" id="remove-image-btn" onclick="removeImage()">حذف عکس</button>
        </div>

        <div class="compose-footer">
            <span id="char-count">0 / 5000 کاراکتر</span>
            <button class="save-btn" id="save-btn" onclick="saveMessage()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                    <polyline points="7 3 7 8 15 8"/>
                </svg>
                ذخیره پیام
            </button>
        </div>
    </div>

    <!-- لیست پیام‌های فعلی -->
    <div class="messages-section">
        <h2>
            📌 پیام‌های منتشرشده
            <span class="message-count" id="message-count">—</span>
        </h2>

        <!-- فیلتر بر اساس دسته‌بندی -->
        <div class="filter-tabs" id="filter-tabs">
            <button class="filter-tab active" data-id="" onclick="filterByCategory('', this)">همه دسته‌ها</button>
        </div>

        <div id="messages-list">
            <!-- skeleton loading -->
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>
    </div>

</div>

<!-- ============================================
     اسکریپت جاوااسکریپت: کل منطق پنل ادمین
     (بررسی ورود، ارسال/حذف پیام، مدیریت دسته‌بندی)
     ============================================ -->
<script>
    // ─────────────────────────────────────
    // آدرس‌های API (این ۳ فایل PHP در backend/api هستند)
    // ─────────────────────────────────────
    const MESSAGES_API   = '../../backend/api/messages.php';
    const CATEGORIES_API = '../../backend/api/categories.php';
    const AUTH_API       = '../../backend/api/auth.php';

    const input          = document.getElementById('message-input');
    const saveBtn        = document.getElementById('save-btn');
    const charCount      = document.getElementById('char-count');
    const messageList    = document.getElementById('messages-list');
    const msgCount       = document.getElementById('message-count');
    const toast          = document.getElementById('toast');
    const categorySelect = document.getElementById('category-select');
    const filterTabs     = document.getElementById('filter-tabs');
    const newCatRow      = document.getElementById('new-category-row');
    const newCatInput    = document.getElementById('new-category-input');
    const addCatBtn      = document.getElementById('add-category-btn');
    const adminBadge     = document.getElementById('admin-badge');

    // المان‌های مربوط به آپلود عکس
    const imageInput      = document.getElementById('image-input');
    const imagePreviewWrap = document.getElementById('image-preview-wrap');
    const imagePreview    = document.getElementById('image-preview');
    const imageWidthSelect = document.getElementById('image-width-select');
    const removeImageBtn  = document.getElementById('remove-image-btn');

    let toastTimer = null;
    let currentFilter = '';
    let selectedImageFile = null; // فایل عکسی که کاربر انتخاب کرده (تا وقتی ارسال شود)

    // حداکثر حجم مجاز عکس: ۵ مگابایت (باید با محدودیت سمت سرور یکی باشد)
    const MAX_IMAGE_SIZE = 5 * 1024 * 1024;

    // ─────────────────────────────────────
    // بررسی ورود ادمین قبل از نمایش پنل
    // ─────────────────────────────────────
    async function checkAuth() {
        try {
            const res  = await fetch(`${AUTH_API}?action=status`, { credentials: 'include' });
            const data = await res.json();

            if (!data.success || !data.authenticated) {
                window.location.href = 'login.html';
                return;
            }

            adminBadge.textContent = `👤 ${data.username}`;
            document.getElementById('auth-checking').style.display = 'none';
            document.getElementById('app').style.display = 'block';

            init();

        } catch (err) {
            window.location.href = 'login.html';
        }
    }

    async function logout() {
        try {
            await fetch(`${AUTH_API}?action=logout`, {
                method: 'POST',
                credentials: 'include',
            });
        } finally {
            window.location.href = 'login.html';
        }
    }

    function init() {
        loadCategories();
        loadMessages();

        input.addEventListener('input', () => {
            charCount.textContent = `${input.value.length} / 5000 کاراکتر`;
        });

        input.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'Enter') saveMessage();
        });

        imageInput.addEventListener('change', onImageSelected);
    }

    // ─────────────────────────────────────
    // انتخاب عکس: اعتبارسنجی + نمایش پیش‌نمایش
    // ─────────────────────────────────────
    function onImageSelected() {
        const file = imageInput.files[0];
        if (!file) return;

        const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
        if (!allowedTypes.includes(file.type)) {
            showToast('error', 'فرمت عکس مجاز نیست. فقط JPG، PNG، GIF و WebP قابل قبول است.');
            imageInput.value = '';
            return;
        }

        if (file.size > MAX_IMAGE_SIZE) {
            showToast('error', 'حجم عکس نباید بیشتر از ۵ مگابایت باشد.');
            imageInput.value = '';
            return;
        }

        selectedImageFile = file;

        const reader = new FileReader();
        reader.onload = (e) => {
            imagePreview.src = e.target.result;
            imagePreviewWrap.classList.add('show');
            imageWidthSelect.classList.add('show');
            removeImageBtn.classList.add('show');
        };
        reader.readAsDataURL(file);
    }

    // حذف عکس انتخاب‌شده قبل از ارسال پیام
    function removeImage() {
        selectedImageFile = null;
        imageInput.value = '';
        imagePreview.src = '';
        imagePreviewWrap.classList.remove('show');
        imageWidthSelect.classList.remove('show');
        removeImageBtn.classList.remove('show');
    }

    // ─────────────────────────────────────
    // نمایش اعلان
    // ─────────────────────────────────────
    function showToast(type, message) {
        clearTimeout(toastTimer);
        toast.className = `toast ${type}`;
        toast.innerHTML = (type === 'success')
            ? `✅ ${message}`
            : `❌ ${message}`;

        toastTimer = setTimeout(() => {
            toast.className = 'toast';
        }, 4000);
    }

    // ─────────────────────────────────────
    // دسته‌بندی‌ها: بارگذاری، افزودن، فیلتر
    // ─────────────────────────────────────
    async function loadCategories() {
        try {
            const res  = await fetch(CATEGORIES_API, { credentials: 'include' });
            const data = await res.json();
            if (!data.success) throw new Error(data.error);

            renderCategorySelect(data.categories);
            renderFilterTabs(data.categories);

        } catch (err) {
            categorySelect.innerHTML = `<option value="">خطا در بارگذاری دسته‌ها</option>`;
        }
    }

    function renderCategorySelect(categories) {
        if (categories.length === 0) {
            categorySelect.innerHTML = `<option value="">ابتدا یک دسته‌بندی اضافه کنید</option>`;
            return;
        }
        categorySelect.innerHTML = categories
            .map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`)
            .join('');

        // اگر قبلاً کاربر چیزی انتخاب نکرده، به‌صورت پیش‌فرض روی دسته «عمومی» تنظیم می‌شود
        // (اگر «عمومی» در لیست نبود، همان اولین گزینه انتخاب‌شده باقی می‌ماند)
        if (!categorySelect.value) {
            const general = categories.find(c => c.name === 'عمومی');
            if (general) categorySelect.value = general.id;
        }
    }

    function renderFilterTabs(categories) {
        const activeAttr = (id) => (String(id) === String(currentFilter)) ? 'active' : '';

        let html = `<button class="filter-tab ${activeAttr('')}" data-id="" onclick="filterByCategory('', this)">همه دسته‌ها</button>`;
        categories.forEach(c => {
            html += `<button class="filter-tab ${activeAttr(c.id)}" data-id="${c.id}" onclick="filterByCategory('${c.id}', this)">${escapeHtml(c.name)} <span style="opacity:.6">(${c.message_count})</span></button>`;
        });
        filterTabs.innerHTML = html;
    }

    function filterByCategory(categoryId, btn) {
        currentFilter = categoryId;
        [...filterTabs.children].forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadMessages();
    }

    function toggleNewCategory() {
        newCatRow.classList.toggle('show');
        if (newCatRow.classList.contains('show')) newCatInput.focus();
    }

    async function addCategory() {
        const name = newCatInput.value.trim();
        if (!name) {
            showToast('error', 'نام دسته‌بندی نمی‌تواند خالی باشد.');
            return;
        }

        addCatBtn.disabled = true;
        addCatBtn.textContent = 'در حال افزودن...';

        try {
            const res = await fetch(CATEGORIES_API, {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name }),
            });
            const data = await res.json();
            if (!data.success) throw new Error(data.error);

            newCatInput.value = '';
            newCatRow.classList.remove('show');
            showToast('success', 'دسته‌بندی جدید اضافه شد.');
            await loadCategories();

            // انتخاب خودکار دسته‌بندی تازه‌ساخته‌شده
            categorySelect.value = data.data.id;

        } catch (err) {
            showToast('error', 'خطا: ' + err.message);
        } finally {
            addCatBtn.disabled = false;
            addCatBtn.textContent = 'افزودن';
        }
    }

    // ─────────────────────────────────────
    // گرفتن لیست پیام‌ها از API
    // ─────────────────────────────────────
    async function loadMessages() {
        try {
            // پنل ادمین همه پیام‌ها را یک‌جا نشان می‌دهد (صفحه‌بندی فقط سمت کاربر است)
            // پس limit را عمداً زیاد می‌فرستیم تا API همه رکوردها را برگرداند
            const params = new URLSearchParams({ limit: '1000' });
            if (currentFilter) params.set('category_id', currentFilter);

            const res  = await fetch(`${MESSAGES_API}?${params.toString()}`, { credentials: 'include' });
            const data = await res.json();

            if (!data.success) throw new Error(data.error);

            msgCount.textContent = data.count;
            renderMessages(data.messages);

        } catch (err) {
            messageList.innerHTML = `<p style="color:#f85149;font-size:.9rem">❌ خطا در بارگذاری: ${err.message}</p>`;
        }
    }

    /**
     * رندر کارت‌های پیام در لیست
     */
    function renderMessages(messages) {
        if (messages.length === 0) {
            messageList.innerHTML = `<p style="color:#8b949e;font-size:.9rem;text-align:center;padding:2rem">پیامی در این دسته‌بندی یافت نشد.</p>`;
            return;
        }

        messageList.innerHTML = '';

        messages.forEach(msg => {
            const card = document.createElement('div');
            card.className = 'message-card';
            card.dataset.id = msg.id;

            const categoryTag = msg.category_name
                ? `<span class="category-tag">${escapeHtml(msg.category_name)}</span>`
                : `<span class="category-tag none">بدون دسته</span>`;

            const imageThumb = msg.image_path
                ? `<img src="../../backend/${msg.image_path}" alt="عکس پیام" style="max-width:120px;max-height:90px;border-radius:6px;border:1px solid #30363d;margin-bottom:0.5rem;display:block">`
                : '';

            card.innerHTML = `
                <span class="message-num">#${msg.id}</span>
                <div class="message-body">
                    ${imageThumb}
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-meta-row">
                        ${categoryTag}
                        <span class="message-time">${formatDate(msg.created_at)}</span>
                    </div>
                </div>
                <button class="delete-btn" onclick="deleteMessage(${msg.id}, this)" title="حذف پیام">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6l-1 14H6L5 6"/>
                        <path d="M10 11v6M14 11v6"/>
                        <path d="M9 6V4h6v2"/>
                    </svg>
                </button>
            `;
            messageList.appendChild(card);
        });
    }

    // ─────────────────────────────────────
    // ذخیره پیام جدید
    // ─────────────────────────────────────
    async function saveMessage() {
        const text       = input.value.trim();
        const categoryId = categorySelect.value; // اگر خالی باشد، سرور خودش دسته «عمومی» را انتخاب می‌کند

        if (!text) {
            showToast('error', 'متن پیام نمی‌تواند خالی باشد.');
            input.focus();
            return;
        }

        // غیرفعال کردن دکمه هنگام ارسال
        saveBtn.disabled = true;
        saveBtn.classList.add('loading');
        saveBtn.innerHTML = `<span>در حال ذخیره...</span>`;

        // از FormData استفاده می‌کنیم چون ممکن است عکس هم ضمیمه باشد
        const formData = new FormData();
        formData.append('text', text);
        formData.append('category_id', categoryId || ''); // خالی = سرور خودش «عمومی» را انتخاب می‌کند
        formData.append('image_width', imageWidthSelect.value);
        if (selectedImageFile) {
            formData.append('image', selectedImageFile);
        }

        try {
            const res = await fetch(MESSAGES_API, {
                method: 'POST',
                credentials: 'include',
                body: formData, // توجه: هنگام استفاده از FormData نباید Content-Type را دستی ست کرد؛ مرورگر خودش تنظیم می‌کند
            });

            const data = await res.json();

            if (!data.success) throw new Error(data.error);

            // موفقیت: پاک کردن فرم و بارگذاری مجدد
            input.value = '';
            charCount.textContent = '0 / 5000 کاراکتر';
            removeImage();
            showToast('success', 'پیام با موفقیت ذخیره شد.');
            await loadCategories();
            await loadMessages();

        } catch (err) {
            showToast('error', 'خطا در ذخیره: ' + err.message);
        } finally {
            saveBtn.disabled = false;
            saveBtn.classList.remove('loading');
            saveBtn.innerHTML = `
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                    <polyline points="7 3 7 8 15 8"/>
                </svg>
                ذخیره پیام
            `;
        }
    }

    // ─────────────────────────────────────
    // حذف پیام
    // ─────────────────────────────────────
    async function deleteMessage(id, btn) {
        if (!confirm(`پیام #${id} حذف شود؟`)) return;

        btn.closest('.message-card').style.opacity = '0.4';

        try {
            const res  = await fetch(`${MESSAGES_API}?id=${id}`, {
                method: 'DELETE',
                credentials: 'include',
            });
            const data = await res.json();

            if (!data.success) throw new Error(data.error);

            btn.closest('.message-card').remove();

            const currentCount = parseInt(msgCount.textContent || '0');
            msgCount.textContent = Math.max(0, currentCount - 1);

            showToast('success', `پیام #${id} حذف شد.`);
            await loadCategories();
        } catch (err) {
            btn.closest('.message-card').style.opacity = '1';
            showToast('error', 'خطا در حذف پیام: ' + err.message);
        }
    }

    // ─────────────────────────────────────
    // ابزارها
    // ─────────────────────────────────────
    function escapeHtml(text) {
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function formatDate(str) {
        return new Date(str).toLocaleString('fa-IR', {
            year: 'numeric', month: 'long', day: 'numeric',
            hour: '2-digit', minute: '2-digit',
        });
    }

    // ─────────────────────────────────────
    // اجرا هنگام لود صفحه
    // ─────────────────────────────────────
    checkAuth();
</script>
