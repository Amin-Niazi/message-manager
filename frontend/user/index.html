<!DOCTYPE html>
<!-- lang="fa" dir="rtl" یعنی زبان صفحه فارسی و جهت نوشتار راست‌به‌چپ است -->
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8"> <!-- کدگذاری کاراکترها؛ برای نمایش درست فارسی لازم است -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- سازگاری با موبایل -->
    <title>تابلوی پیام‌ها</title> <!-- عنوان تب مرورگر -->
    <style>
        /* ─────────────────────────────────────
           تنظیمات پایه و فونت
        ───────────────────────────────────── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        /* ─────────────────────────────────────
           لایه‌بندی کلی
        ───────────────────────────────────── */
        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        /* ─────────────────────────────────────
           هدر صفحه
        ───────────────────────────────────── */
        .page-header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #58a6ff;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .page-header p {
            color: #8b949e;
            font-size: 0.95rem;
        }

        .admin-link {
            display: inline-block;
            margin-top: 0.75rem;
            font-size: 0.8rem;
            color: #8b949e;
            text-decoration: none;
            border: 1px solid #30363d;
            padding: 4px 12px;
            border-radius: 16px;
            transition: all 0.2s;
        }

        .admin-link:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        /* ─────────────────────────────────────
           نوار وضعیت
        ───────────────────────────────────── */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            color: #8b949e;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3fb950;
            flex-shrink: 0;
            animation: pulse 2s infinite;
        }

        .status-dot.loading {
            background: #d29922;
            animation: none;
        }

        .status-dot.error {
            background: #f85149;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ─────────────────────────────────────
           تب‌های دسته‌بندی
        ───────────────────────────────────── */
        .category-section {
            margin-bottom: 1.5rem;
        }

        .category-section h2 {
            font-size: 0.85rem;
            color: #8b949e;
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .filter-tab {
            background: #161b22;
            border: 1px solid #30363d;
            color: #8b949e;
            font-family: inherit;
            font-size: 0.83rem;
            padding: 0.45rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-tab:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .filter-tab.active {
            background: #1f6feb;
            border-color: #388bfd;
            color: #fff;
        }

        /* ─────────────────────────────────────
           لیست پیام‌ها
        ───────────────────────────────────── */
        #messages-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* کارت هر پیام */
        .message-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            transition: border-color 0.2s, transform 0.2s;
            animation: fadeIn 0.3s ease;
        }

        .message-card:hover {
            border-color: #58a6ff;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message-text {
            font-size: 1rem;
            line-height: 1.75;
            color: #e6edf3;
            margin-bottom: 0.75rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message-meta {
            font-size: 0.78rem;
            color: #8b949e;
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .message-id {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 1px 7px;
            font-family: monospace;
            font-size: 0.75rem;
            color: #58a6ff;
        }

        .category-tag {
            font-size: 0.75rem;
            background: #1f2937;
            border: 1px solid #388bfd;
            color: #79c0ff;
            padding: 1px 10px;
            border-radius: 10px;
        }

        .category-tag.none {
            border-color: #30363d;
            color: #8b949e;
        }

        /* ─────────────────────────────────────
           حالت خالی بودن
        ───────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #8b949e;
        }

        .empty-state svg {
            opacity: 0.3;
            margin-bottom: 1rem;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        /* ─────────────────────────────────────
           دکمه رفرش
        ───────────────────────────────────── */
        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0 auto 1.5rem;
            background: none;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #8b949e;
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .refresh-btn.spinning svg {
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- هدر صفحه -->
    <div class="page-header">
        <h1>📋 تابلوی پیام‌ها</h1>
        <p>پیام‌های زیر توسط ادمین منتشر شده‌اند</p>
        <a href="../admin/login.html" class="admin-link">🔐 ورود ادمین</a>
    </div>

    <!-- نوار وضعیت -->
    <div class="status-bar" id="status-bar">
        <span class="status-dot loading" id="status-dot"></span>
        <span id="status-text">در حال بارگذاری پیام‌ها...</span>
    </div>

    <!-- تب‌های دسته‌بندی -->
    <div class="category-section">
        <h2>دسته‌بندی‌ها</h2>
        <div class="filter-tabs" id="filter-tabs">
            <button class="filter-tab active" data-id="" onclick="filterByCategory('', this)">همه پیام‌ها</button>
        </div>
    </div>

    <!-- دکمه رفرش -->
    <button class="refresh-btn" id="refresh-btn" onclick="loadMessages()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 4v6h6M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
        بارگذاری مجدد
    </button>

    <!-- لیست پیام‌ها -->
    <div id="messages-list"></div>

</div>

<!-- ============================================
     اسکریپت جاوااسکریپت: گرفتن پیام‌ها و دسته‌بندی‌ها از سرور و نمایش آن‌ها
     (این صفحه فقط خواندن اطلاعات است؛ نیاز به ورود ندارد)
     ============================================ -->
<script>
    // ─────────────────────────────────────
    // آدرس‌های API بک‌اند (فایل‌های PHP در backend/api)
    // ─────────────────────────────────────
    const MESSAGES_API   = '../../backend/api/messages.php';
    const CATEGORIES_API = '../../backend/api/categories.php';

    // المان‌های DOM
    const messagesList = document.getElementById('messages-list');
    const statusDot     = document.getElementById('status-dot');
    const statusText    = document.getElementById('status-text');
    const refreshBtn     = document.getElementById('refresh-btn');
    const filterTabs     = document.getElementById('filter-tabs');

    let currentFilter = '';

    /**
     * تنظیم وضعیت نوار بالا
     */
    function setStatus(type, text) {
        statusDot.className = 'status-dot ' + (type !== 'ok' ? type : '');
        statusText.textContent = text;
    }

    /**
     * قالب‌بندی تاریخ فارسی
     */
    function formatDate(dateStr) {
        const date = new Date(dateStr);
        return date.toLocaleString('fa-IR', {
            year:   'numeric',
            month:  'long',
            day:    'numeric',
            hour:   '2-digit',
            minute: '2-digit',
        });
    }

    /**
     * جلوگیری از XSS با escape کردن HTML
     */
    function escapeHtml(text) {
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    /**
     * گرفتن دسته‌بندی‌ها و ساخت تب‌های فیلتر
     * (کاربر می‌تواند همه دسته‌ها را ببیند)
     */
    async function loadCategories() {
        try {
            const res  = await fetch(CATEGORIES_API);
            const data = await res.json();
            if (!data.success) throw new Error(data.error);

            const activeAttr = (id) => (String(id) === String(currentFilter)) ? 'active' : '';

            let html = `<button class="filter-tab ${activeAttr('')}" data-id="" onclick="filterByCategory('', this)">همه پیام‌ها</button>`;
            data.categories.forEach(c => {
                html += `<button class="filter-tab ${activeAttr(c.id)}" data-id="${c.id}" onclick="filterByCategory('${c.id}', this)">${escapeHtml(c.name)} <span style="opacity:.6">(${c.message_count})</span></button>`;
            });
            filterTabs.innerHTML = html;

        } catch (err) {
            // در صورت خطا، فقط تب «همه پیام‌ها» باقی می‌ماند
        }
    }

    function filterByCategory(categoryId, btn) {
        currentFilter = categoryId;
        [...filterTabs.children].forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadMessages();
    }

    /**
     * گرفتن پیام‌ها از API و نمایش در صفحه
     */
    async function loadMessages() {
        // نمایش حالت لودینگ
        setStatus('loading', 'در حال دریافت پیام‌ها...');
        refreshBtn.classList.add('spinning');
        messagesList.innerHTML = '';

        try {
            const url = currentFilter
                ? `${MESSAGES_API}?category_id=${encodeURIComponent(currentFilter)}`
                : MESSAGES_API;

            const res  = await fetch(url);
            const data = await res.json();

            if (!data.success) {
                throw new Error(data.error || 'خطای ناشناخته');
            }

            const messages = data.messages;

            if (messages.length === 0) {
                // حالت خالی
                messagesList.innerHTML = `
                    <div class="empty-state">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                        <p>هنوز هیچ پیامی در این دسته‌بندی منتشر نشده است.</p>
                    </div>
                `;
            } else {
                // رندر کارت هر پیام
                messages.forEach(msg => {
                    const card = document.createElement('div');
                    card.className = 'message-card';

                    const categoryTag = msg.category_name
                        ? `<span class="category-tag">${escapeHtml(msg.category_name)}</span>`
                        : `<span class="category-tag none">بدون دسته</span>`;

                    card.innerHTML = `
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        <div class="message-meta">
                            <span class="message-id">#${msg.id}</span>
                            ${categoryTag}
                            <span>${formatDate(msg.created_at)}</span>
                        </div>
                    `;
                    messagesList.appendChild(card);
                });
            }

            setStatus('ok', `${messages.length} پیام دریافت شد`);

        } catch (err) {
            setStatus('error', 'خطا در اتصال به سرور: ' + err.message);
            messagesList.innerHTML = `
                <div class="empty-state">
                    <p style="color:#f85149">❌ خطا در بارگذاری پیام‌ها. لطفاً دوباره تلاش کنید.</p>
                </div>
            `;
        } finally {
            refreshBtn.classList.remove('spinning');
        }
    }

    // بارگذاری اولیه هنگام ورود به صفحه
    loadCategories();
    loadMessages();
</script>

</body>
</html>
